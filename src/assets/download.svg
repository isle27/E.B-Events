<svg xmlns="http://www.w3.org/2000/svg" width="120" height="120" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFD700"></stop>
      <stop offset="100%" stop-color="#B8860B"></stop>
    </linearGradient>
    <radialGradient id="brownShadow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8B4513" stop-opacity="0.6"></stop>
      <stop offset="100%" stop-color="#5C3317" stop-opacity="0.6"></stop>
    </radialGradient>
  </defs>

  <!-- Background Circle -->
  <circle cx="60" cy="60" r="55" fill="#8B4513"></circle>

  <!-- E.B Letters -->
  <text x="50%" y="50%" text-anchor="middle" dominant-baseline="middle" font-family="Georgia, serif" font-size="50" font-weight="bold" fill="url(#goldGradient)">
    E.B
  </text>

  <!-- Subtle shadow/glow -->
  <circle cx="60" cy="60" r="55" fill="url(#brownShadow)"></circle>
</svg>