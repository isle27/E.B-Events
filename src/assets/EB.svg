<svg xmlns="http://www.w3.org/2000/svg" width="120" height="120" viewBox="0 0 120 120">
  <defs>
    <!-- Brighter Gold Gradient -->
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFF176"></stop>  <!-- Light gold -->
      <stop offset="50%" stop-color="#FFD700"></stop> <!-- Classic gold -->
      <stop offset="100%" stop-color="#FFC107"></stop> <!-- Deep gold -->
    </linearGradient>

    <!-- Subtle radial shadow for depth -->
    <radialGradient id="brownShadow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8B4513" stop-opacity="0.4"></stop>
      <stop offset="100%" stop-color="#5C3317" stop-opacity="0.4"></stop>
    </radialGradient>
  </defs>

  <!-- Background Circle -->
  <circle cx="60" cy="60" r="55" fill="#8B4513"></circle>

  <!-- E.B Letters with brighter gold -->
  <text x="50%" y="50%" text-anchor="middle" dominant-baseline="middle" font-family="Georgia, serif" font-size="50" font-weight="bold" fill="url(#goldGradient)" stroke="#B8860B" stroke-width="1">
    E.B
  </text>

  <!-- Subtle shadow overlay for depth -->
  <circle cx="60" cy="60" r="55" fill="url(#brownShadow)"></circle>
</svg>